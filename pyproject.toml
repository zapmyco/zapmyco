[tool.poetry]
name = "zapmyco"
version = "0.1.0"
description = "Zapmyco is a home agent."
authors = [
    "shenjingnan <sjn.code@gmail.com>"
]
license = "Apache-2.0"
readme = "README.md"
packages = [
    { include = "zapmyco" }
]

